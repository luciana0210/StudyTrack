<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTrack - Planejamento de Estudos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-book"></i> StudyTrack</h1>
            <p>Sistema de Planejamento e Acompanhamento de Estudos</p>
        </header>

        <!-- Seção Cadastro de Disciplinas -->
        <section class="card">
            <h2><i class="fas fa-graduation-cap"></i> Cadastrar Disciplina</h2>
            <form id="disciplinaForm">
                <div class="form-group">
                    <label>Nome da Disciplina:</label>
                    <input type="text" id="nomeDisciplina" required>
                </div>
                <div class="form-group">
                    <label>Carga Horária Prevista (horas):</label>
                    <input type="number" id="cargaHoraria" min="1" required>
                </div>
                <button type="submit"><i class="fas fa-plus"></i> Adicionar Disciplina</button>
            </form>
        </section>

        <!-- Seção Cadastro de Metas -->
        <section class="card">
            <h2><i class="fas fa-target"></i> Cadastrar Meta</h2>
            <form id="metaForm">
                <select id="selectDisciplina" required>
                    <option value="">Selecione uma disciplina...</option>
                </select>
                <div class="form-group">
                    <label>Descrição da Meta:</label>
                    <input type="text" id="descricaoMeta" required>
                </div>
                <button type="submit"><i class="fas fa-plus"></i> Adicionar Meta</button>
            </form>
        </section>

        <!-- Seção Registro de Horas -->
        <section class="card">
            <h2><i class="fas fa-clock"></i> Registrar Horas Estudadas</h2>
            <form id="registroForm">
                <select id="selectDisciplinaRegistro" required>
                    <option value="">Selecione uma disciplina...</option>
                </select>
                <div class="form-group">
                    <label>Data:</label>
                    <input type="date" id="dataEstudo" required>
                </div>
                <div class="form-group">
                    <label>Horas Estudadas:</label>
                    <input type="number" id="horasEstudadas" min="0" step="0.1" required>
                </div>
                <button type="submit"><i class="fas fa-save"></i> Registrar</button>
            </form>
        </section>

        <!-- Dashboard de Progresso -->
        <section class="dashboard">
            <h2><i class="fas fa-chart-line"></i> Dashboard de Progresso</h2>
            
            <div class="filtros">
                <button class="filtro-btn active" data-filtro="todas">Todas</button>
                <button class="filtro-btn" data-filtro="semana">Semana</button>
                <button class="filtro-btn" data-filtro="mes">Mês</button>
            </div>

            <div id="relatorios" class="relatorios-grid">
                <!-- Relatórios serão populados dinamicamente -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
